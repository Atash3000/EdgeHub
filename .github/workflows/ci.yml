name: CI
on:
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "24", cache: npm }
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - uses: aws-actions/setup-sam@v2
        with: { use-installer: true }
      - run: sam validate --lint
      - run: sam build
